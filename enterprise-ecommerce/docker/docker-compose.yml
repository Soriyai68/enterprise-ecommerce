version: '3.8'
services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: ecommerce
      MYSQL_ROOT_PASSWORD: secret
    ports:
      - "3306:3306"
  
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
  
  api:
    build: ../apps/api
    ports:
      - "5000:5000"
    depends_on:
      - mysql
      - redis
    environment:
      DB_HOST: mysql
      REDIS_HOST: redis
  
  web:
    build: ../apps/web
    ports:
      - "3000:3000"
    depends_on:
      - api
